<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Blintix Studio</title>
    <meta name="description" content="The page you're looking for doesn't exist. Head back to the Blintix Studio homepage or browse our latest products.">

    <!-- Canonical URL -->
    <link rel="canonical" href="https://blintix.store/404.html" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://blintix.store/404.html">
    <meta property="og:title" content="404 — Page Not Found | Blintix Studio">
    <meta property="og:description" content="The page you're looking for doesn't exist. Head back to the Blintix Studio homepage.">
    <meta property="og:image" content="https://blintix.store/og-image.png">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="404 — Page Not Found | Blintix Studio">
    <meta name="twitter:description" content="The page you're looking for doesn't exist.">
    <meta name="twitter:image" content="https://blintix.store/favicon.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="/style.css">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">

    <style>
        .error-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
            background: var(--bg-base);
        }

        .error-content {
            z-index: 2;
            padding: 0 24px;
        }

        .error-code {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(8rem, 20vw, 15rem);
            line-height: 0.8;
            margin-bottom: 24px;
            font-style: italic;
            background: linear-gradient(135deg, #ffffff 30%, rgba(255, 255, 255, 0.1) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .error-title {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }

        .error-desc {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 480px;
            margin: 0 auto 40px;
            line-height: 1.6;
        }

        .error-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .bg-gradient-404 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, rgba(167, 139, 250, 0.1) 0%, transparent 70%);
            z-index: 1;
            pointer-events: none;
        }

        .error-footer {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            color: var(--text-muted);
            font-size: 0.9rem;
            z-index: 2;
        }

        .error-logo {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
        }

        .error-logo img {
            height: 32px;
            width: auto;
            filter: invert(1) brightness(1.2);
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }

        .error-logo:hover img {
            opacity: 1;
        }
    </style>
</head>

<body>
    <main class="error-page">
        <a href="/" class="error-logo">
            <img src="/logo2.png" alt="Blintix Logo">
        </a>

        <div class="bg-gradient-404"></div>

        <div class="error-content">
            <h1 class="error-code reveal">404</h1>
            <h2 class="error-title reveal">Something's missing.</h2>
            <p class="error-desc reveal">
                The page you're looking for has either moved to a new home or never existed in first place.
            </p>
            <div class="error-actions reveal">
                <a href="/" class="btn btn-primary">Back to Home</a>
                <a href="/blog/" class="btn btn-outline">Read the Journal</a>
                <a href="/#products" class="btn btn-outline">Explore Tools</a>
            </div>
        </div>

        <footer class="error-footer reveal">
            &copy; 2026 Blintix Studio. Radical Simplicity.
        </footer>
    </main>

    <!-- Motion Library -->
    <script src="https://cdn.jsdelivr.net/npm/motion@11.11.13/dist/motion.js"></script>
    <script>
        const { animate, stagger } = Motion;

        // Animations
        animate(
            ".reveal",
            { opacity: [0, 1], y: [40, 0] },
            { delay: stagger(0.1), duration: 0.8, easing: [0.16, 1, 0.3, 1] }
        );

        // Subtle parallax on mouse move
        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            
            animate(".bg-gradient-404", { x: x * -1, y: y * -1 }, { duration: 0.5 });
            animate(".error-code", { rotate: (x / 10) }, { duration: 0.5 });
        });
    </script>
</body>

</html>

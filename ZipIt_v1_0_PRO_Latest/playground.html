<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZipIt | Component Playground</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #050505;
            --panel: #0d0d0d;
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --muted: #a1a1a6;
            --accent: #ff5c1a;
            --green: #22c55e;
            --blue: #3b82f6;
        }

        body {
            font-family: 'Geist', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Glass Effect */
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }

        /* Header */
        .header {
            height: 64px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-name {
            font-weight: 700;
            font-size: 18px;
            letter-spacing: -0.5px;
        }

        .logo-accent {
            color: var(--accent);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .badge-pro {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 99px;
            color: var(--muted);
        }

        .btn-render {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(255, 92, 26, 0.3);
        }

        .btn-render:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(255, 92, 26, 0.4);
            filter: brightness(1.1);
        }

        .btn-render:active {
            transform: translateY(1px);
        }

        /* Main Workspace */
        .workspace {
            flex: 1;
            display: flex;
            min-height: 0;
        }

        /* Editor Section */
        .editor-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            background: var(--panel);
        }

        .section-header {
            height: 40px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02);
        }

        .header-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
        }

        .btn-clear {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: #ef4444;
            background: none;
            border: none;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .btn-clear:hover {
            opacity: 1;
        }

        #codeEditor {
            flex: 1;
            background: transparent;
            border: none;
            padding: 24px;
            color: #3b82f6;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        /* Preview Section */
        .preview-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f3f4f6;
        }

        .preview-header {
            height: 40px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            background: #fdfdfd;
        }

        .preview-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
        }

        .window-dots {
            display: flex;
            gap: 6px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e2e8f0;
        }

        .preview-frame-container {
            flex: 1;
            position: relative;
            background: #e2e8f0;
            padding: 1px;
        }

        #previewContent {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.05);
        }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: 99px;
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            z-index: 1000;
        }

        #toast.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast-dot {
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--green);
        }

        .toast-text {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: white;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header class="header glass">
        <div class="logo">
            <div class="logo-icon">
                <svg width="28" height="28" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="logo-grad" x1="0" y1="0" x2="100" y2="100">
                            <stop offset="0%" stop-color="#FF7A00" />
                            <stop offset="100%" stop-color="#FF3D00" />
                        </linearGradient>
                    </defs>
                    <rect width="100" height="100" rx="24" fill="url(#logo-grad)" />
                    <circle cx="50" cy="50" r="32" fill="white" fill-opacity="0.15" />
                    <path d="M56 18L28 55H48L42 82L72 45H52L56 18Z" fill="white" />
                </svg>
            </div>
            <div class="logo-name">ZipIt <span class="logo-accent">Playground</span></div>
        </div>
        <div class="header-actions">
            <span class="badge-pro">System Sync Pro 2.0</span>
            <button class="btn-render" onclick="renderCode()">
                <span>🚀 Render Component</span>
            </button>
        </div>
    </header>

    <!-- Workspace -->
    <main class="workspace">

        <!-- Editor -->
        <section class="editor-section">
            <div class="section-header">
                <span class="header-label">Paste AI HTML / Tailwind Code</span>
                <button class="btn-clear" onclick="clearEditor()">Clear</button>
            </div>
            <textarea id="codeEditor" spellcheck="false" placeholder="<!-- Paste your code here... -->"></textarea>
        </section>

        <!-- Preview -->
        <section class="preview-section">
            <div class="preview-header">
                <span class="preview-label">Live Production Preview</span>
                <div class="window-dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>
            <div class="preview-frame-container">
                <iframe id="previewContent"></iframe>
            </div>
        </section>

    </main>

    <!-- Toast -->
    <div id="toast">
        <div class="toast-dot"></div>
        <span class="toast-text">Ready for System Sync! Open ZipIt to Copy.</span>
    </div>

    <script>
        let currentObjectURL = null;

        function renderCode() {
            const code = document.getElementById('codeEditor').value.trim();
            if (!code) return;

            const preview = document.getElementById('previewContent');

            let finalContent = '';
            const isFullDoc = code.toLowerCase().includes('<head') || code.toLowerCase().includes('<body');

            if (!isFullDoc) {
                finalContent = `
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="utf-8">
                    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"><\/script>
                    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
                    <style>
                        body { 
                            font-family: 'Geist', sans-serif; 
                            margin: 0; 
                            padding: 24px;
                            background: #fff;
                            min-height: 100vh;
                            color: #111;
                        }
                        * { transition: all 0.2s ease-in-out; }
                    </style>
                </head>
                <body>
                    ${code}
                </body>
                </html>
            `;
            } else {
                finalContent = code;
                if (!code.toLowerCase().includes('tailwindcss.com')) {
                    finalContent = code.replace('</head>', '<script src="https://cdn.tailwindcss.com?plugins=forms,typography"><\/script></head>');
                }
            }

            if (currentObjectURL) {
                URL.revokeObjectURL(currentObjectURL);
            }

            const blob = new Blob([finalContent], { type: 'text/html' });
            currentObjectURL = URL.createObjectURL(blob);
            preview.src = currentObjectURL;

            showToast();
        }

        function clearEditor() {
            document.getElementById('codeEditor').value = '';
            document.getElementById('previewContent').src = '';
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('visible');
            setTimeout(() => {
                toast.classList.remove('visible');
            }, 2000);
        }

        // Support for Tab key
        const editor = document.getElementById('codeEditor');
        if (editor) {
            editor.addEventListener('keydown', function (e) {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    var start = this.selectionStart;
                    var end = this.selectionEnd;
                    this.value = this.value.substring(0, start) + "  " + this.value.substring(end);
                    this.selectionStart = this.selectionEnd = start + 2;
                }
            });

            const renderBtn = document.querySelector('.btn-render');
            if (renderBtn) {
                renderBtn.addEventListener('click', renderCode);
            }

            editor.addEventListener('paste', () => setTimeout(renderCode, 150));
            if (editor.value) renderCode();
        }
    </script>
</body>

</html>
